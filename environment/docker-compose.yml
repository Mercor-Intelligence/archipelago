services:
  environment:
    build:
      context: ..
      dockerfile: environment/Dockerfile
      secrets:
        - github_token
    image: apex-test-environment:latest
    pull_policy: never
    ports:
      - "8080:8080"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

secrets:
  github_token:
    file: /run/secrets/github_token
