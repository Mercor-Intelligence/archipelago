# Exclude data folder globally (raw JSON files, DuckDB)
exclude: "^data/"

repos:
  # Pre-commit hooks for general file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-added-large-files
        exclude: "(testdata|docs/.*|data/.*)"

  # Python formatting with Ruff
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff-format
        language_version: python3.12

  # Linting and auto-fixes with Ruff
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff
        language_version: python3.12
        args: ["--fix", "--select=E,W,F,I,B,C4,UP", "--ignore=E501,B008"]

  # Type checking with BasedPyright
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false

  # Run unit tests before push
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit tests)
        entry: uv run pytest tests/ -v --tb=short -x -m "not integration"
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
