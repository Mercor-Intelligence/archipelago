# Alembic migration configuration for bamboohr

[alembic]
script_location = db/migrations
prepend_sys_path = .
# Note: Alembic migrations use file-based DB for schema versioning
# Runtime uses in-memory DB (see db/session.py)
# Using async driver (aiosqlite) to match async env.py configuration
sqlalchemy.url = sqlite+aiosqlite:///./migrations.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
