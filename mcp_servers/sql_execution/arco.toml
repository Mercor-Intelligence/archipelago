[arco]
source = "foundry_app"
name = "SQL Execution"
version = "1.0.0"

[arco.env.host]
REPO_URL = "https://github.com/Mercor-Intelligence/mercor-rls-sql-execution.git"

[arco.env.build]

[arco.env.runtime]
MCP_TRANSPORT = "http"
MCP_PORT = "5000"
HAS_STATE = "true"
APP_FS_ROOT = "/filesystem"
STATE_LOCATION = "/.apps_data/sql_execution"

[arco.secrets.host]
GITHUB_TOKEN = "RLS_GITHUB_READ_TOKEN"

[arco.secrets.build]

[arco.secrets.runtime]
