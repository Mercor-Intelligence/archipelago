[arco]
source = "foundry_app"
name = "PDFs"
version = "1.0.0"

[arco.env.host]
REPO_URL = "https://github.com/Mercor-Intelligence/mercor-rls-pdf.git"

[arco.env.build]

[arco.env.runtime]
MCP_TRANSPORT = "http"
MCP_PORT = "5000"
APP_FS_ROOT = "/filesystem"
USE_INDIVIDUAL_TOOLS = "true"

[arco.env.runtime.schema.USE_INDIVIDUAL_TOOLS]
type = "bool"
label = "Use individual tools"
description = "Enable individual tools for UI instead of consolidated meta-tools for LLMs"

[arco.secrets.host]
GITHUB_TOKEN = "RLS_GITHUB_READ_TOKEN"

[arco.secrets.build]

[arco.secrets.runtime]

# Error injection scenarios for Dynamic Friction testing
[[arco.error_injection_scenarios]]
name = "intermittent_timeout"
description = "Simulates occasional timeout errors across all tools"
error_rules = [
    { error_type = "timeout", tool = "*", probability = 0.0, message = "Operation timed out" }
]

[[arco.error_injection_scenarios]]
name = "rate_limited"
description = "Simulates API rate limiting across all tools"
error_rules = [
    { error_type = "rate_limit", tool = "*", probability = 0.0, message = "Rate limit exceeded. Please retry after a short delay." }
]

[[arco.error_injection_scenarios]]
name = "server_errors"
description = "Simulates sporadic server errors"
error_rules = [
    { error_type = "server_error", tool = "*", probability = 0.0, message = "Internal server error" }
]

[[arco.error_injection_scenarios]]
name = "permission_denied"
description = "Simulates permission errors for file operations"
error_rules = [
    { error_type = "permission_denied", tool = "*", probability = 0.0, message = "Permission denied: insufficient access rights" }
]

[[arco.error_injection_scenarios]]
name = "malformed_response"
description = "Simulates malformed API responses"
error_rules = [
    { error_type = "malformed_response", tool = "*", probability = 0.0, message = "Received malformed response from server" }
]

[[arco.error_injection_scenarios]]
name = "chaos_mode"
description = "High probability of various errors for stress testing"
error_rules = [
    { error_type = "timeout", tool = "*", probability = 0.0, message = "Operation timed out" },
    { error_type = "rate_limit", tool = "*", probability = 0.0, message = "Rate limit exceeded" },
    { error_type = "server_error", tool = "*", probability = 0.0, message = "Internal server error" }
]
