[env._.python.venv]
path = ".venv"
create = true

[tools]
uv = "0.6.10"
python = "3.13"

[tasks.install]
run = "uv sync --all-extras"
description = "Install dependencies"

[tasks.test]
run = "pytest"
description = "Run tests"

[tasks.typecheck]
run = "echo 'No typecheck configured'"
description = "Run type checker"

[tasks.lint]
run = "ruff check ."
description = "Run linter"

[tasks.format]
run = "ruff format ."
description = "Format code"

[tasks.start]
run = "cd mcp_servers/fmp_server && uv run --no-sync python main.py"
description = "Start the MCP server"
depends = ["install"]

[tasks.build]
run = "echo 'No build step required for Python MCP server'"
description = "Build the project (no-op for pure Python)"

[tasks.populate]
run = """
mkdir -p "${STATE_LOCATION}" data mcp_servers/fmp_server/data && count=$(ls "${STATE_LOCATION}"/*.db 2>/dev/null | wc -l) && if [ "$count" -gt 1 ]; then echo "Error: expected at most 1 .db file but found $count" >&2; exit 1; elif [ "$count" -eq 1 ]; then cp "${STATE_LOCATION}"/*.db mcp_servers/fmp_server/data/fmp.db && echo "Copied fmp.db to mcp_servers/fmp_server/data/"; fi
"""
description = "Copy SQLite fixtures into place for offline mode"
depends = ["build"]
