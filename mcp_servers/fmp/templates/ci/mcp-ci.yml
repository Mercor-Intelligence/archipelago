# Standard MCP Server CI Workflow
# Generated by mercor-mcp framework
# This is a TEMPLATE for individual MCP server projects (e.g., mercor-SAP).
# It is NOT used by the mercor-mcp framework itself (which has its own .github/workflows/ci.yml).
# Customize the SERVER_NAME variable for your project.

name: MCP Server CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Configure these for your server
  SERVER_NAME: "{{SERVER_NAME}}"
  TEST_PATH: "tests/"
  SERVER_PATH: "mcp_servers/{{SERVER_NAME_SNAKE}}/"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: make install

      - name: Run linting and format check
        run: make lint && uv run ruff format --check .

      - name: Run bandit security scan
        run: make security
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: make install

      - name: Run tests
        run: make test

      - name: Check test coverage
        run: make coverage
        continue-on-error: true
