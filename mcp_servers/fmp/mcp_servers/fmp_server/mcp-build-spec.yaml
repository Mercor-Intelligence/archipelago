version: "1.0"
project_name: "fmp_server"

servers:
  - name: fmp_server
    display_name: "Financial Modeling Prep"
    description: "MCP server for Financial Modeling Prep API - stock quotes, financials, market data"
    tools_module: "mcp_servers.fmp_server.tools"
    base_url: "http://localhost:8000"
    requires_auth: false

categories:
  - name: "Stock Quotes"
    description: "Real-time and historical stock quotes, price data"
    servers: [fmp_server]

  - name: "Company Info"
    description: "Company profiles, executives, peers, and search"
    servers: [fmp_server]

  - name: "Financial Statements"
    description: "Income statements, balance sheets, cash flow, and ratios"
    servers: [fmp_server]

  - name: "Analyst Data"
    description: "Analyst ratings, estimates, price targets, and grades"
    servers: [fmp_server]

  - name: "Market Performance"
    description: "Gainers, losers, sector performance, and market data"
    servers: [fmp_server]

  - name: "Earnings & Dividends"
    description: "Earnings calendar, dividends, splits, and transcripts"
    servers: [fmp_server]

  - name: "ETFs & Funds"
    description: "ETF profiles, holdings, and mutual fund data"
    servers: [fmp_server]

  - name: "Indexes"
    description: "S&P 500, NASDAQ, Dow Jones constituents and data"
    servers: [fmp_server]

  - name: "Technical Analysis"
    description: "Technical indicators - SMA, EMA, RSI, ADX, and more"
    servers: [fmp_server]

  - name: "News"
    description: "Stock news, forex news, crypto news, and press releases"
    servers: [fmp_server]

  - name: "Economics"
    description: "Treasury rates, economic indicators, and calendar"
    servers: [fmp_server]

  - name: "Valuation"
    description: "DCF valuations and enterprise value"
    servers: [fmp_server]

  - name: "Alternative Assets"
    description: "Forex, crypto, and commodities"
    servers: [fmp_server]

  - name: "Stock Directory"
    description: "Stock symbols, exchanges, and listings"
    servers: [fmp_server]

  - name: "Market Hours"
    description: "Exchange market hours and holidays"
    servers: [fmp_server]

