[arco]
source = "foundry_app"
name = "Edgar SEC"
version = "1.0.0"

[arco.env.host]
REPO_URL = "https://github.com/Mercor-Intelligence/mercor-edgarsec.git"

[arco.env.build]
STATE_LOCATION = "/.apps_data/edgar_sec"

[arco.env.runtime]
MCP_TRANSPORT = "http"
MCP_PORT = "5000"
APP_FS_ROOT = "/filesystem"
EDGAR_USER_AGENT = "RL-Studio rls@mercor.com"
INTERNET_ENABLED = "true"
EDGAR_OFFLINE_MODE = "false"
GUI_ENABLED = "true"
HAS_STATE = "true"
STATE_LOCATION = "/.apps_data/edgar_sec"

[arco.env.runtime.schema.INTERNET_ENABLED]
type = "bool"
label = "Internet access"
description = "Allow the MCP server to make outbound network requests"

[arco.env.runtime.schema.EDGAR_OFFLINE_MODE]
type = "string"
label = "Offline mode"
description = "Set 'true' to use bundled SEC data for S&P 500, 'false' for live EDGAR API"

[arco.env.runtime.schema.GUI_ENABLED]
type = "bool"
label = "GUI mode"
description = "Enable GUI mode to expose all individual tools instead of consolidated meta-tools"

[arco.secrets.host]
GITHUB_TOKEN = "RLS_GITHUB_READ_TOKEN"

[arco.secrets.build]

[arco.secrets.runtime]
