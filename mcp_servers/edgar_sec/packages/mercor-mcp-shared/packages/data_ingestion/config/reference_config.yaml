# ================================================================================
# PIPELINE CONFIGURATION
# ================================================================================
# NOTE: Persister is typically passed programmatically via code, not in YAML config.
#       See usage examples at the end of this file.
#
# ================================================================================
# Optional settings that control processing behavior

pipeline:
  batch_size: 1000              # Number of records per batch insert
                                # Larger = faster but more memory
                                # Smaller = slower but less memory
                                # Typical range: 100-10000

  # ------ Future Options ------
  # max_errors: 100             # Stop after N errors
  # skip_validation: false      # Skip record validation
  # parallel_workers: 4         # Process in parallel
  # checkpoint_interval: 10000  # Save progress every N records


# ================================================================================
# FIELD TYPE REFERENCE
# ================================================================================
#
# string:
#   - Returns text content as Python str
#   - Strips whitespace automatically
#   - Returns None if element not found (and not required)
#
# integer:
#   - Converts to Python int
#   - Returns None if empty string or not found
#   - Raises ValidationError if cannot convert
#
# decimal:
#   - Converts to Python Decimal (precise decimal arithmetic)
#   - Returns None if empty string or not found
#   - Raises ValidationError if cannot convert
#
# date:
#   - Returns raw string from XML (no parsing/formatting)
#   - Application must handle date parsing
#   - Common formats: "20240101", "2024-01-01", "2024-01-01T00:00:00Z"
#
# array:
#   - Returns list of dicts
#   - Each dict has keys from array_item_fields
#   - Returns empty list [] if no elements found
#   - Sub-fields use same types as above (except no nested arrays)
#
# ================================================================================
# XPATH REFERENCE
# ================================================================================
#
# Common XPath patterns:
#   .//element              - Find element anywhere under current node
#   ./element               - Find direct child element
#   ./@attribute            - Extract attribute value
#   ../parent               - Navigate to parent element
#   element[1]              - First occurrence (XPath is 1-indexed)
#   element[@attr='value']  - Filter by attribute
#   text()                  - Extract text content
#   count(.//element)       - Count matching elements
#   xpath1 | xpath2         - Try xpath1, fallback to xpath2
#
# XPath functions:
#   count()                 - Count nodes
#   concat()                - Concatenate strings
#   substring()             - Extract substring
#   normalize-space()       - Trim whitespace
#
# ================================================================================
# USAGE EXAMPLES
# ================================================================================
#
# Basic usage:
#   from data_ingestion.framework import IngestionFramework
#   from my_app.persisters import MyPersister
#
#   framework = IngestionFramework('config.yaml')
#   persister = MyPersister()
#   stats = framework.run(persister)
#   print(f"Processed {stats.records_processed} records")
#
# With resume:
#   stats = framework.run(persister, start_position=byte_offset)
#
# With callback:
#   def on_complete(stats):
#       print(f"Success rate: {stats.success_rate}%")
#
#   framework = IngestionFramework('config.yaml', on_complete=on_complete)
#   stats = framework.run(persister)
#
# ================================================================================
