# MCP Server CI Workflow
# Generated by mercor-mcp-shared framework
#
# Features:
# - Change detection to only test affected servers (supports monorepos)
# - Matrix testing across Python versions
# - Lint and format checks
# - Root tests for shared code
#
# Prerequisites:
# - uv and Python installed

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.set-matrix.outputs.servers }}
      any_server_changes: ${{ steps.set-matrix.outputs.any_server_changes }}
      test_reason: ${{ steps.set-matrix.outputs.test_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          json: true
          escape_json: false

      - name: Determine affected servers
        id: set-matrix
        env:
          CHANGED_FILES_JSON: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          set -euo pipefail

          # Get all server directories
          all_servers=$(find mcp_servers -maxdepth 1 -mindepth 1 -type d -exec basename {} \; | sort)

          # Check if we have any changed files
          if [[ -z "$CHANGED_FILES_JSON" ]] || [[ "$CHANGED_FILES_JSON" == "[]" ]] || [[ "$CHANGED_FILES_JSON" == "null" ]]; then
            echo "No files changed"
            echo "servers=[]" >> $GITHUB_OUTPUT
            echo "any_server_changes=false" >> $GITHUB_OUTPUT
            echo "test_reason=none" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any files outside mcp_servers/{server}/ changed (using jq to safely parse JSON)
          shared_changed=""
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            # Match files NOT in mcp_servers/{server}/ pattern (includes root, packages/, etc.)
            if ! echo "$file" | grep -q '^mcp_servers/[^/]\+/'; then
              shared_changed="true"
              break
            fi
          done < <(echo "$CHANGED_FILES_JSON" | jq -r '.[]' 2>/dev/null || echo "")

          # Determine which servers to test
          if [[ -n "$shared_changed" ]]; then
            # Shared files changed - test all servers
            affected_servers="$all_servers"
            test_reason="shared"
            echo "Shared files changed, testing all servers"
          else
            # Only server-specific files changed
            affected_servers=""
            for server in $all_servers; do
              if echo "$CHANGED_FILES_JSON" | jq -r '.[]' 2>/dev/null | grep -q "mcp_servers/$server/"; then
                affected_servers="$affected_servers $server"
              fi
            done
            test_reason="specific"
            echo "Testing affected servers: $affected_servers"
          fi

          # Convert to JSON array for matrix
          if [[ -n "$affected_servers" ]]; then
            servers_json=$(echo $affected_servers | tr ' ' '\n' | jq -R . | jq -sc .)
            echo "servers=$servers_json" >> $GITHUB_OUTPUT
            echo "any_server_changes=true" >> $GITHUB_OUTPUT
            echo "test_reason=$test_reason" >> $GITHUB_OUTPUT
          else
            echo "servers=[]" >> $GITHUB_OUTPUT
            echo "any_server_changes=false" >> $GITHUB_OUTPUT
            echo "test_reason=none" >> $GITHUB_OUTPUT
            echo "No server changes detected"
          fi

  lint-and-shared:
    name: Lint and Shared Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: lint-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Run ruff formatter check
        run: uv run ruff format --check .

      - name: Run root tests
        if: hashFiles('tests/**/*.py') != ''
        run: uv run --no-project pytest tests/ -v

  test-servers:
    name: Test ${{ matrix.server }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.any_server_changes == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.detect-changes.outputs.servers) }}
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ matrix.server }}-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check for tests
        id: check-tests
        run: |
          SERVER="${{ matrix.server }}"

          # Priority 1: Per-server tests directory
          if [ -d "mcp_servers/$SERVER/tests" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "test_path=mcp_servers/$SERVER/tests" >> $GITHUB_OUTPUT
            echo "Found per-server tests: mcp_servers/$SERVER/tests/"

          # Priority 2: Tests configured via pyproject.toml
          elif [ -f "mcp_servers/$SERVER/pyproject.toml" ] && grep -q "testpaths" "mcp_servers/$SERVER/pyproject.toml"; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "test_path=" >> $GITHUB_OUTPUT
            echo "Tests configured via pyproject.toml"

          # Priority 3: Root-level test file (mercor-mcp pattern)
          elif [ -f "tests/test_${SERVER}.py" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
            echo "test_path=tests/test_${SERVER}.py" >> $GITHUB_OUTPUT
            echo "Found root-level test: tests/test_${SERVER}.py"

          # No tests found
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "No tests found for $SERVER"
          fi

      - name: Run tests
        if: steps.check-tests.outputs.has_tests == 'true'
        working-directory: ${{ steps.check-tests.outputs.test_path && '.' || format('mcp_servers/{0}', matrix.server) }}
        run: |
          if [ -n "${{ steps.check-tests.outputs.test_path }}" ]; then
            uv run --no-project pytest "${{ steps.check-tests.outputs.test_path }}" -v
          else
            uv run --no-project pytest -v
          fi

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lint-and-shared
      - test-servers
    if: ${{ always() }}
    steps:
      - name: Evaluate CI results
        run: |
          set -euo pipefail

          # Change detection must succeed
          if [[ "${{ needs.detect-changes.result }}" != "success" ]]; then
            echo "::error::Change detection failed"
            exit 1
          fi

          # Lint and shared tests must pass
          if [[ "${{ needs.lint-and-shared.result }}" != "success" ]]; then
            echo "::error::Lint and shared tests failed"
            exit 1
          fi

          # Server tests must pass or be skipped (if no changes)
          if [[ "${{ needs.detect-changes.outputs.any_server_changes }}" == "true" ]]; then
            if [[ "${{ needs.test-servers.result }}" != "success" ]]; then
              echo "::error::Server tests failed"
              exit 1
            fi
          else
            echo "No server changes detected, server tests were skipped"
          fi

          echo "All CI checks passed"
