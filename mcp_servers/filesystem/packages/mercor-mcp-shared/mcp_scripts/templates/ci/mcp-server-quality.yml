# MCP Server Quality Workflow
# Validates MCP tool definitions and code quality for changed servers.
#
# Features:
# - Change detection to only validate affected servers
# - Ruff linting and formatting
# - Tool name validation (lowercase_underscore)
# - MCP tool definition validation (schemas, types, descriptions)
#
# Prerequisites:
# - scripts/validate_tool_names.py (from mercor-mcp-shared)
# - scripts/validate_mcp_tools.py (from mercor-mcp-shared)

name: mcp-server-quality

on:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      servers: ${{ steps.set-matrix.outputs.servers }}
      any_changes: ${{ steps.set-matrix.outputs.any_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            mcp_servers/**
            .github/workflows/mcp-server-quality.yml

      - name: Determine affected servers
        id: set-matrix
        run: |
          set -euo pipefail

          # Get all server directories
          all_servers=$(find mcp_servers -maxdepth 1 -mindepth 1 -type d -exec basename {} \; | sort)

          # If no files changed, skip all servers
          if [[ "${{ steps.changed-files.outputs.any_changed }}" != "true" ]]; then
            affected_servers=""
          # If workflow file changed, test all servers
          elif echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -q "mcp-server-quality.yml"; then
            affected_servers="$all_servers"
          else
            # Find affected servers based on changed files
            affected_servers=""
            for server in $all_servers; do
              if echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -q "mcp_servers/$server/"; then
                affected_servers="$affected_servers $server"
              fi
            done
          fi

          # Convert to JSON array for matrix
          if [[ -n "$affected_servers" ]]; then
            servers_json=$(echo $affected_servers | tr ' ' '\n' | jq -R . | jq -sc .)
            echo "servers=$servers_json" >> $GITHUB_OUTPUT
            echo "any_changes=true" >> $GITHUB_OUTPUT
            echo "Affected servers: $affected_servers"
          else
            echo "servers=[]" >> $GITHUB_OUTPUT
            echo "any_changes=false" >> $GITHUB_OUTPUT
            echo "No servers affected"
          fi

  test-servers:
    name: ${{ matrix.server }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.any_changes == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        server: ${{ fromJson(needs.detect-changes.outputs.servers) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ matrix.server }}-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras

      - name: ruff check
        run: uv run ruff check mcp_servers/${{ matrix.server }}

      - name: ruff format check
        run: uv run ruff format --check mcp_servers/${{ matrix.server }}

      - name: Validate tool names
        run: uv run python scripts/validate_tool_names.py mcp_servers/${{ matrix.server }}

      - name: Validate MCP tool definitions
        run: uv run python scripts/validate_mcp_tools.py mcp_servers/${{ matrix.server }}

  quality-gate:
    name: mcp-server-quality-gate
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - test-servers
    if: ${{ always() }}
    steps:
      - name: Evaluate server quality jobs
        run: |
          set -euo pipefail

          echo "Change detection: ${{ needs.detect-changes.result }}"
          echo "Server quality tests: ${{ needs.test-servers.result }}"

          # Change detection must succeed
          if [[ "${{ needs.detect-changes.result }}" != "success" ]]; then
            echo "::error::Change detection failed"
            exit 1
          fi

          # Server quality tests must pass or be skipped (if no changes)
          if [[ "${{ needs.detect-changes.outputs.any_changes }}" == "true" ]]; then
            if [[ "${{ needs.test-servers.result }}" != "success" ]]; then
              echo "::error::Server quality checks failed"
              exit 1
            fi
          else
            echo "No changes detected, skipping quality checks"
          fi
