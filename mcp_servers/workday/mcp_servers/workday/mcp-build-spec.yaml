version: "1.0"
project_name: "workday"

servers:
  - name: workday
    display_name: "Workday HCM"
    description: "Mock MCP server simulating Workday Human Capital Management APIs for pre-onboarding coordination and workforce management (includes Workday Help module)"
    tools_module: "mcp_servers.workday.tools"
    base_url: "http://localhost:8000"
    requires_auth: true
    auth_type: "bearer"

categories:
  # HCM Categories
  - name: "Workers"
    description: "Hire, terminate, transfer, and query worker records"
    servers: [workday]

  - name: "Positions"
    description: "Create, close, and manage job positions"
    servers: [workday]

  - name: "Organizations"
    description: "Manage supervisory organizations and hierarchy"
    servers: [workday]

  - name: "Job Profiles"
    description: "Create and query job profile definitions"
    servers: [workday]

  - name: "Cost Centers & Locations"
    description: "Manage cost centers and work locations"
    servers: [workday]

  - name: "Cases"
    description: "Pre-onboarding case lifecycle management"
    servers: [workday]

  - name: "Milestones & Tasks"
    description: "Track onboarding milestones and manual tasks"
    servers: [workday]

  - name: "Policies"
    description: "Manage lead time policies and payroll cutoffs"
    servers: [workday]

  - name: "Exceptions"
    description: "Request and approve milestone exceptions"
    servers: [workday]

  - name: "HCM Integration"
    description: "Read HCM context and confirm start dates"
    servers: [workday]

  - name: "Reports"
    description: "Generate workforce and organizational reports"
    servers: [workday]

  - name: "Audit"
    description: "View audit trail and change history"
    servers: [workday]

  - name: "System"
    description: "Health checks and server status"
    servers: [workday]

  # Workday Help Categories
  - name: "Help Cases"
    description: "Create, view, and update help desk cases with ownership, status, and due dates"
    servers: [workday]

  - name: "Help Messages"
    description: "Log internal/inbound/outbound case communications"
    servers: [workday]

  - name: "Help Timeline"
    description: "Append timeline events and retrieve timelines or snapshots"
    servers: [workday]

  - name: "Help Attachments"
    description: "Add and list attachments for help cases"
    servers: [workday]

tool_overrides:
  # ==========================================================================
  # Workers
  # ==========================================================================
  - tool: "workday.workday_hire_worker"
    category: "Workers"
    display_name: "Hire Worker"

  - tool: "workday.workday_get_worker"
    category: "Workers"
    display_name: "Get Worker"

  - tool: "workday.workday_list_workers"
    category: "Workers"
    display_name: "List Workers"

  - tool: "workday.workday_terminate_worker"
    category: "Workers"
    display_name: "Terminate Worker"

  - tool: "workday.workday_transfer_worker"
    category: "Workers"
    display_name: "Transfer Worker"

  # ==========================================================================
  # Positions
  # ==========================================================================
