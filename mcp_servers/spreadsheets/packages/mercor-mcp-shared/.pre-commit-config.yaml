# Standard MCP Server Pre-commit Configuration
# Generated by mercor-mcp framework
# Install: pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Local hook — invokes the same `mise run typecheck` task that
  # `.pre-commit-hooks.yaml` publishes to consumers, so commits to this
  # repo are gated by basedpyright the same way consumer commits are.
  # Requires mise; see mise.toml at the repo root for the task def.
  - repo: local
    hooks:
      - id: typecheck
        name: Typecheck (mise run typecheck → basedpyright)
        description: >-
          Run basedpyright via `mise run typecheck`. Uses the local
          uv-managed venv so type stubs match tests and CI.
        language: system
        entry: "bash -c 'command -v mise >/dev/null 2>&1 || { echo \"ERROR: mise not installed - install from https://mise.jdx.dev/getting-started.html\"; exit 1; }; mise run typecheck'"
        pass_filenames: false
        types: [python]
