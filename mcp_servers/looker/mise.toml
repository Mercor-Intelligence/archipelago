[env]
_.file = ".env"

[env._.python.venv]
path = ".venv"
create = true

[tools]
uv = "0.6.10"
python = "3.13"

[tasks.start]
run = "uv run --no-sync python mcp_servers/looker/main.py"
description = "Start the MCP server"
depends = ["populate"]

[tasks.populate]
run = """
cd mcp_servers/looker && uv run --no-sync python scripts/populate_data_layer.py
# Fix ownership for biome environment (no-op if not in container)
if [ -d "/.apps_data/looker" ]; then
  chmod -R g+rw /.apps_data/looker 2>/dev/null || true
fi
"""
description = "Populate the Looker data layer (DuckDB + LookML)"
depends = ["build"]

[tasks.format]
run = "ruff format ."
description = "Format code"

[tasks.test]
run = "pytest"
description = "Run tests"

[tasks.lint]
run = "ruff check ."
description = "Run linter"

[tasks.typecheck]
run = "echo 'No typecheck configured'"
description = "Run type checker"

[tasks.install]
run = "uv sync --all-extras"
description = "Install dependencies"

[tasks.build]
run = "echo 'No build step required for Python MCP server'"
description = "Build the project (no-op for pure Python)"
depends = ["install"]

[tasks.build-bundled-db]
# Rebuild the bundled DuckDB (only needed when bundled CSVs change)
run = "cd mcp_servers/looker && uv run --no-sync python scripts/build_duckdb.py -f"
description = "Rebuild bundled DuckDB from CSV files (for committing)"
depends = ["build"]
