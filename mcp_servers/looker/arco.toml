[arco]
source = "foundry_app"
name = "Looker"
version = "1.0.0"
env_base = "standard"

[arco.env.host]
REPO_URL = "https://github.com/Mercor-Intelligence/mercor-looker.git"

[arco.env.build]
STATE_LOCATION = "/.apps_data/looker"

[arco.env.runtime]
MCP_TRANSPORT = "http"
MCP_PORT = "5000"
HAS_STATE = "true"
APP_FS_ROOT = "/filesystem"
STATE_LOCATION = "/.apps_data/looker"
OFFLINE_MODE = "true"
INTERNET_ENABLED = "false"
GUI_ENABLED = "true"

# Looker API
LOOKER_BASE_URL = ""
LOOKER_PROJECT_GIT_URL = ""
LOOKER_PROJECT_GIT_BRANCH = "main"
LOOKER_PROJECT_NAME = ""
LOOKER_CONNECTION_NAME = "database"

# RLS integration
RLS_API_URL = "https://api.studio.mercor.com"
RLS_COMPANY_ID = ""
RLS_CAMPAIGN_ID = ""
LOOKER_CLIENT_ID = ""
LOOKER_CLIENT_SECRET = ""
LOOKER_API_KEY = ""
LOOKER_WEBHOOK_SECRET = ""

# Database
DATABASE_URL = ""
OFFLINE_POSTGRES_URL = ""
DATABASE_SCHEMA = "public"

# Shared library (mcp_middleware / mcp_auth)
ENABLE_AUTH = ""
DISABLE_AUTH = ""
JSON_LOGS = ""
LOG_FILE = ""
LOGLEVEL = "INFO"
MCP_LOCAL_FILES_DIR = ""

# Smoke test / CI
ORCHESTRATOR_MODEL = ""
ENVIRONMENT_IMAGE = ""
BUILD_IMAGE = ""

# Shared template vars (used by mercor-mcp-shared templates)
APPS_DATA_ROOT = ""
TOOLS = ""
__UPPER_NAME___API_URL = ""
__UPPER_NAME___MODE = ""

# Shell script vars (flagged by validator but not real env vars)
HAS_MAIN_PY = ""
HAS_META_TOOLS = ""
HAS_PRODUCT_SPEC = ""
HAS_ROOT_WIKI = ""
HAS_SERVER_WIKI = ""
HAS_UI_API_CONFIG = ""
HAS_UI_COMPONENTS = ""
HAS_UI_DIR = ""
HAS_UI_PACKAGE = ""
HAS_UI_PY = ""
HAS_WIKI = ""
LOOKER_URL = ""
NC = ""
OSTYPE = ""
OUTPUT_DIR = ""
PID_FILE = ""
PROJECT_ROOT = ""
READY_FOR_QC = ""
RED = ""
REPLY = ""
SCRIPT_DIR = ""
SERVER = ""
SERVER_PATH = ""
TEMP_DIR = ""
TEST_COUNT = ""
TEST_RESULT = ""
TOKEN_PREFIX = ""
VERIFY_SSL = ""
WATCH_CMD = ""
WIKI_FILES = ""
YELLOW = ""
BASH_SOURCE = ""
BLUE = ""
BOLD = ""
CLAUDE_PROJECTS_DIR = ""
CLIENT_ID = ""
CLIENT_SECRET = ""
DAEMON_MODE = ""
ENV_FILE = ""
ERROR_MSG = ""
FLAGS = ""
GREEN = ""
GUIDE_IN_SYNC = ""
HAS_BUILD_PLAN = ""
HAS_DUAL_REGISTRATION = ""
HAS_GUIDE_JSON = ""
HAS_GUI_ENABLED = ""

[arco.env.runtime.schema.INTERNET_ENABLED]
type = "bool"
label = "Internet access"
description = "Allow the MCP server to make outbound network requests"

[arco.env.runtime.schema.GUI_ENABLED]
type = "bool"
label = "GUI mode"
description = "Enable GUI mode to expose all individual tools instead of consolidated meta-tools"

[arco.secrets.host]
GITHUB_TOKEN = "RLS_GITHUB_READ_TOKEN"

[arco.secrets.build]
GITHUB_TOKEN = "RLS_GITHUB_READ_TOKEN"

# [arco.secrets.runtime] intentionally empty — this app runs offline
